<!-- Email Item Component -->
<!-- Used in: Script Email List, IMAP Email List, EML Import List -->
<!-- Props: email, firma, subject, from, date, snippet, status, index, onImport -->

<!-- Basic Email Item Card -->
<div class="email-item">
    <div class="email-item-header">
        <div style="flex:1;">
            <div class="email-firma">{{firma}}</div>
            <div class="email-subject">{{subject}}</div>
            <div style="font-size:0.78rem;color:var(--text-muted);margin-top:0.2rem;">
                Von: {{from}} · {{date}}
            </div>
            <div style="font-size:0.8rem;color:var(--text-muted);margin-top:0.35rem;line-height:1.4;">
                {{snippet}}…
            </div>
        </div>
        <div style="display:flex;flex-direction:column;gap:0.35rem;flex-shrink:0;margin-left:0.75rem;">
            {{statusBadge}}
            <button class="btn btn-primary btn-sm" onclick="{{onImport}}">+ Import</button>
        </div>
    </div>
</div>

<!-- Alternative: Compact Email Item (for lists) -->
<div class="email-item-compact">
    <div style="display:flex;align-items:center;gap:0.75rem;padding:0.6rem 0;border-bottom:1px solid var(--border);cursor:pointer;">
        <div style="flex:1;">
            <strong>{{firma}}</strong>
            <span style="color:var(--text-muted);font-size:0.8rem;margin-left:0.5rem;">{{subject}}</span>
        </div>
        {{statusBadge}}
        <div style="color:var(--text-muted);font-size:0.8rem;">{{date}}</div>
    </div>
</div>

<!-- Styles for email items (in components.css) -->
<style>
.email-item {
    background:var(--bg-card);
    border:1px solid var(--border);
    border-radius:10px;
    padding:1rem;
    margin-bottom:0.75rem;
    transition:all 0.2s;
}

.email-item:hover {
    background:var(--bg-card2);
    border-color:var(--primary);
}

.email-item-header {
    display:flex;
    align-items:flex-start;
    gap:1rem;
}

.email-firma {
    font-weight:600;
    font-size:0.95rem;
    color:var(--primary-light);
}

.email-subject {
    font-weight:500;
    margin-top:0.15rem;
    color:var(--text);
}

.email-item-compact {
    background:transparent;
    padding:0.6rem 0;
    border-bottom:1px solid var(--border);
}

.email-item-compact:hover {
    background:var(--bg-card);
    padding:0.6rem 0.75rem;
    border-radius:6px;
}
</style>
