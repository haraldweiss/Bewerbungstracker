<!-- Modal Component
     Usage (basic):
     <div class="modal-overlay" id="myModal">
         <div class="modal">
             <div class="modal-header">
                 <h2 class="modal-title">{TITLE}</h2>
                 <button class="modal-close" onclick="closeModal('myModal')">×</button>
             </div>
             <div class="modal-body">
                 {CONTENT}
             </div>
             <div class="modal-footer">
                 <button class="btn btn-secondary" onclick="closeModal('myModal')">Abbrechen</button>
                 <button class="btn btn-primary" onclick="handleSubmit()">Speichern</button>
             </div>
         </div>
     </div>

     Usage (with form):
     <div class="modal-overlay" id="myModal">
         <div class="modal">
             <div class="modal-header">
                 <h2 class="modal-title">{TITLE}</h2>
                 <button class="modal-close" onclick="closeModal('myModal')">×</button>
             </div>
             <form class="modal-body" onsubmit="handleSubmit(event)">
                 {FORM_FIELDS}
             </form>
             <div class="modal-footer">
                 <button class="btn btn-secondary" onclick="closeModal('myModal')">Abbrechen</button>
                 <button class="btn btn-primary" type="submit">Speichern</button>
             </div>
         </div>
     </div>

     JavaScript:
     function openModal(id) { document.getElementById(id).classList.add('open'); }
     function closeModal(id) { document.getElementById(id).classList.remove('open'); }
-->

<style scoped>
.modal-overlay {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0, 0, 0, 0.5);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    backdrop-filter: blur(3px);
    padding: 1rem;
}

.modal-overlay.open {
    display: flex;
}

.modal {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 2rem;
    max-width: 90vw;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    animation: modalSlideUp 0.3s ease;
}

@keyframes modalSlideUp {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1.5rem;
    gap: 1rem;
}

.modal-title {
    font-size: 1.25rem;
    font-weight: 700;
    color: var(--text);
    margin: 0;
}

.modal-close {
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 1.5rem;
    padding: 0;
    line-height: 1;
    transition: color 0.2s;
    flex-shrink: 0;
}

.modal-close:hover {
    color: var(--text);
}

.modal-body {
    display: flex;
    flex-direction: column;
    gap: 1rem;
    margin-bottom: 1.5rem;
}

.modal-footer {
    display: flex;
    gap: 0.75rem;
    justify-content: flex-end;
    padding-top: 1rem;
    border-top: 1px solid var(--border);
    flex-wrap: wrap;
}

/* Variant: large modal */
.modal.modal-large {
    max-width: 700px;
}

/* Variant: small modal */
.modal.modal-small {
    max-width: 400px;
}

/* Variant: full-width */
.modal.modal-fullwidth {
    max-width: calc(100vw - 2rem);
}

/* Scrollable content */
.modal-body.modal-body-scrollable {
    max-height: 60vh;
    overflow-y: auto;
    padding-right: 0.5rem;
}

.modal-body.modal-body-scrollable::-webkit-scrollbar {
    width: 6px;
}

.modal-body.modal-body-scrollable::-webkit-scrollbar-track {
    background: transparent;
}

.modal-body.modal-body-scrollable::-webkit-scrollbar-thumb {
    background: var(--border);
    border-radius: 3px;
}

.modal-body.modal-body-scrollable::-webkit-scrollbar-thumb:hover {
    background: var(--text-muted);
}
</style>
