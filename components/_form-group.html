<!-- Form Group Component
     Usage:
     <div class="form-group">
         <label>{LABEL}</label>
         <input type="text" id="{ID}" placeholder="{PLACEHOLDER}">
     </div>

     or with select:
     <div class="form-group">
         <label>{LABEL}</label>
         <select id="{ID}">
             <option>{OPTIONS}</option>
         </select>
     </div>

     or with textarea:
     <div class="form-group">
         <label>{LABEL}</label>
         <textarea id="{ID}" rows="4" placeholder="{PLACEHOLDER}"></textarea>
     </div>
-->

<style scoped>
.form-group {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    width: 100%;
}

.form-group label {
    font-weight: 500;
    font-size: 0.9rem;
    color: var(--text);
}

.form-group input,
.form-group select,
.form-group textarea {
    padding: 0.65rem;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--bg);
    color: var(--text);
    font-size: 0.9rem;
    font-family: inherit;
    transition: all 0.2s;
}

.form-group input:focus,
.form-group select:focus,
.form-group textarea:focus {
    outline: none;
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
    background: var(--bg-card);
}

.form-group input::placeholder,

    color: var(--text-muted);

}
</style>
