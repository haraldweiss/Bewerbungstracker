# Bewerbungstracker Virtual Host - HTTP (redirect to HTTPS)
<VirtualHost *:80>
    ServerName bewerbungen.wolfinisoftware.de
    ServerAlias bewerbung.wolfinisoftware.de
    ServerAdmin admin@wolfinisoftware.de
    DocumentRoot /var/www/html

    # ACME-Challenge MUSS vor dem Redirect bedient werden – sonst kann Let's
    # Encrypt das Cert nicht ausstellen/erneuern.
    Alias /.well-known/acme-challenge/ /var/www/html/.well-known/acme-challenge/
    <Directory /var/www/html/.well-known/acme-challenge/>
        Options None
        AllowOverride None
        Require all granted
    </Directory>

    # Alles andere zu HTTPS umleiten
    RewriteEngine On
    RewriteCond %{REQUEST_URI} !^/\.well-known/acme-challenge/
    RewriteRule ^(.*)$ https://%{HTTP_HOST}%{REQUEST_URI} [L,R=permanent]

    ErrorLog /var/log/httpd/bewerbungen_error.log
    CustomLog /var/log/httpd/bewerbungen_access.log combined
</VirtualHost>

# Bewerbungstracker Virtual Host - HTTPS
<VirtualHost *:443>
    ServerName bewerbungen.wolfinisoftware.de
    ServerAlias bewerbung.wolfinisoftware.de
    ServerAdmin admin@wolfinisoftware.de
    DocumentRoot /var/www/html

    # SSL Configuration
    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/bewerbungen.wolfinisoftware.de/cert.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/bewerbungen.wolfinisoftware.de/privkey.pem
    SSLCertificateChainFile /etc/letsencrypt/live/bewerbungen.wolfinisoftware.de/chain.pem

    # SSL Protocol and Cipher Configuration
    SSLProtocol -all +TLSv1.2 +TLSv1.3
    SSLCipherSuite HIGH:!aNULL:!MD5
    SSLHonorCipherOrder on

    # Enable HSTS
    <IfModule mod_headers.c>
        Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains"
        Header set X-Content-Type-Options "nosniff"
        Header set X-Frame-Options "SAMEORIGIN"
        Header set X-XSS-Protection "1; mode=block"
    </IfModule>

    # Reverse proxy: imap-proxy (Port 8765) + email-service (Port 8766)
    # Diese MÜSSEN VOR dem catch-all "ProxyPass / ..." stehen, damit sie greifen.
    <IfModule mod_proxy.c>
        ProxyPreserveHost On

        # IMAP-Proxy: trailing slash strip, damit /imap-proxy/X → /X auf 8765
        ProxyPass /imap-proxy/ http://127.0.0.1:8765/
        ProxyPassReverse /imap-proxy/ http://127.0.0.1:8765/

        # Email-Service
        ProxyPass /email-service/ http://127.0.0.1:8766/
        ProxyPassReverse /email-service/ http://127.0.0.1:8766/

        # Default: alles andere an Gunicorn (Flask-App)
        ProxyPass / http://127.0.0.1:5000/
        ProxyPassReverse / http://127.0.0.1:5000/

        # WebSocket support
        ProxyPass /ws ws://127.0.0.1:5000/ws
        ProxyPassReverse /ws ws://127.0.0.1:5000/ws
    </IfModule>

    ErrorLog /var/log/httpd/bewerbungen_error.log
    CustomLog /var/log/httpd/bewerbungen_access.log combined
</VirtualHost>
